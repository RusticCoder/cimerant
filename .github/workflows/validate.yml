# This workflow will build a package using Maven and then deploy it to GitHub packages when a release is created
#
# [About workflows](https://docs.github.com/en/actions/using-workflows/about-workflows)
# [Workflow syntax](https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#on)
#
# Github Action format code on check-in pull
# Github pre commit format code on check-in pull
# https://github.com/pre-commit/pre-commit-hooks

name: Validate

run-name: ${{ github.action }} run by ${{ github.actor }} on ${{ github.repository }} triggered by ${{ github.event_name }}

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  id-token: write
  packages: write
  pages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # [Automating builds and tests](https://docs.github.com/en/actions/automating-builds-and-tests)
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: [17]
    steps:
      # https://github.com/actions/checkout
      - name: Check-out repository
        uses: actions/checkout@v4

      # https://github.com/actions/setup-java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # https://github.com/s4u/setup-maven-action
      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.7.0
        with:
          java-version: '17'
          java-distribution: 'temurin'
          maven-version: 3.9.1

      # [Building and testing Java with Maven](https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven)
      # [Apache Maven with a settings path](https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path)

      - name: Maven test databases
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@athena or @hive or @mariadb or @mySql or @phoenix or @plSql or @postgreSQL or @snowflake or @sqLite or @tSql"

      - name: Maven test back forward Slash
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@backSlashLowerCaseTemplate or @backSlashLowerCaseValue or @backSlashTitleCaseTemplate or @backSlashTitleCaseValue or @backSlashUpperCaseTemplate or @backSlashUpperCaseValue or @forwardSlashLowerCaseTemplate or @forwardSlashLowerCaseValue or @forwardSlashTitleCaseTemplate or @forwardSlashTitleCaseValue or @forwardSlashUpperCaseTemplate or @forwardSlashUpperCaseValue"

      - name: Maven test case
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@camelCaseTemplate or @camelCaseValue or @lowerCaseTemplate or @lowerCaseValue or @pascalCaseTemplate or @pascalCaseValue or @titleCaseTemplate or @titleCaseValue or @upperCaseTemplate or @upperCaseValue"

      - name: Maven test dot first
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@dotLowerCaseTemplate or @dotLowerCaseValue or @dotTitleCaseTemplate or @dotTitleCaseValue or @dotUpperCaseTemplate or @dotUpperCaseValue or @kebabLowerCaseTemplate or @kebabLowerCaseValue or @kebabTitleCaseTemplate or @kebabTitleCaseValue or @kebabUpperCaseTemplate or @kebabUpperCaseValue or @snakeLowerCaseTemplate or @snakeLowerCaseValue or @snakeTitleCaseTemplate or @snakeTitleCaseValue or @snakeUpperCaseTemplate or @snakeUpperCaseValue"

      - name: Maven test upper lower
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@commandLineArguments or @lowerFirstTemplate or @lowerFirstValue or @multiTemplateDynamic or @multiTemplateVariables or @singleTemplate or @singleTemplateDynamic or @singleTemplateStatic or @singleTemplateVariables or @upperFirstTemplate or @upperFirstValue"

      - name: Maven test error
        run: mvn --batch-mode clean validate verify pmd:check pmd:cpd-check -Dcucumber.filter.tags="@err0002 or @err0003 or @err0004 or @err0005 or @err0006 or @err0006Blank or @err0006Missing or @err0007 or @err0007Blank or @err0007Missing or @err0008 or @err0008Blank or @err0008Missing or @err0009 or @err0010 or @err0011 or @err0012 or @err0013 or @err0014 or @err0015 or @err0016 or @err0017 or @err0018 or @err0019 or @err0020"
